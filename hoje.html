<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrício IA — Hoje</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="lockScreen">
  <div class="lock-initial">P</div>
  <div class="lock-subtitle">Patrício IA</div>
  <div class="lock-quote" id="lqText"></div>
  <div class="lock-form">
    <input type="password" class="lock-input" id="lkInput" placeholder="••••••••">
    <button class="lock-btn" onclick="doUnlock()">Entrar</button>
    <div class="lock-err" id="lkErr"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <a href="hoje.html" class="topbar-logo">P</a>
    <nav id="mainNav"></nav>
    <div class="topbar-space"></div>
    <div class="search-wrapper">
      <button class="search-btn" id="globalSearchBtn">⌕ Pesquisar</button>
      <div class="search-box" id="globalSearchBox">
        <input class="search-input" id="globalSearchInput" placeholder="Pesquisar em todo o site...">
        <div class="search-results" id="globalSearchResults"></div>
      </div>
    </div>
    <div class="cost-row" style="margin-left:12px">
      <div class="cost-pill"><span class="cost-lbl">Sessão</span><span class="cost-val" id="cSess">€0.000</span></div>
      <div class="cost-pill"><span class="cost-lbl">Hoje</span><span class="cost-val" id="cDay">€0.000</span></div>
      <div class="cost-pill"><span class="cost-lbl">Mês</span><span class="cost-val" id="cMonth">€0.000</span></div>
      <div class="cost-pill"><span class="cost-lbl">Total</span><span class="cost-val" id="cTotal">€0.000</span></div>
    </div>
  </div>

  <div class="app-body">
    <div class="sidebar" id="sb">
      <div class="sb-head"><button class="sb-toggle" onclick="toggleSB()">☰</button></div>
      <div class="sb-section">Hoje</div>
      <button class="nav-i active" onclick="goTo('hoje')">Painel do Dia</button>
      <button class="nav-i" onclick="goTo('relatorio')">Relatório Semanal</button>
    </div>

    <div class="main">

      <!-- HOJE -->
      <div class="section on" id="s-hoje">
        <div class="page-head">
          <div class="page-head-left">
            <div class="page-eye">Painel Diário</div>
            <div class="page-title" id="todayTitle">—</div>
          </div>
          <div class="page-actions">
            <button class="btn-secondary" onclick="refreshToday()">Atualizar</button>
            <button class="btn-primary" onclick="getAIBriefing()">Briefing IA</button>
          </div>
        </div>
        <div class="scroll-body">
          <div class="today-grid" id="todayGrid"></div>
          <div class="divider"></div>
          <div id="aiBriefing"></div>
        </div>
      </div>

      <!-- RELATÓRIO SEMANAL -->
      <div class="section" id="s-relatorio">
        <div class="page-head">
          <div class="page-head-left"><div class="page-eye">IA</div><div class="page-title">Relatório Semanal</div></div>
          <button class="btn-primary" onclick="generateWeeklyReport()" id="weeklyBtn">Gerar relatório</button>
        </div>
        <div class="scroll-body">
          <div id="weeklyOutput">
            <div class="empty-wrap"><div class="empty-mono">P</div><div class="empty-txt">Gera o relatório da tua semana</div></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="shared.js"></script>
<script>
initLock(() => {
  buildNav('hoje.html');
  updateCostDisplay();
  initGlobalSearch();
  renderToday();
});

function goTo(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.nav-i').forEach(b => b.classList.remove('active'));
  document.getElementById('s-' + id).classList.add('on');
  document.querySelector(`[onclick="goTo('${id}')"]`).classList.add('active');
}
let sbOpen = true;
function toggleSB() { sbOpen = !sbOpen; document.getElementById('sb').classList.toggle('closed', !sbOpen); }

function renderToday() {
  const now = new Date();
  const days = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
  const months = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  document.getElementById('todayTitle').textContent = `${days[now.getDay()]}, ${now.getDate()} de ${months[now.getMonth()]}`;

  const today = now.toISOString().split('T')[0];
  const cal = PA.get('cal', []);
  const todayPosts = cal.filter(p => p.date === today);
  const habits = PA.get('habits', []);
  const objs = PA.get('objectives', []).filter(o => {
    if (!o.deadline) return false;
    const days = Math.ceil((new Date(o.deadline) - now) / 86400000);
    return days >= 0 && days <= 7;
  });

  const postsHtml = todayPosts.length
    ? todayPosts.map(p => `<div class="today-item"><div class="today-item-dot gold"></div><div class="today-item-text"><strong>${p.title}</strong> · ${p.platform} · ${p.time||''}</div><span class="badge ${p.status==='publicado'?'green':p.status==='agendado'?'blue':'gray'}">${p.status}</span></div>`).join('')
    : '<div style="font-size:12px;color:var(--text-light);padding:8px 0">Sem posts agendados para hoje</div>';

  const habitsHtml = habits.length
    ? habits.map(h => {
        const done = (h.completions||[]).includes(today);
        return `<div class="today-item"><div class="today-item-dot ${done?'done':''}"></div><div class="today-item-text">${h.title}</div><button style="font-size:11px;background:none;border:1px solid var(--border);padding:3px 10px;border-radius:20px;cursor:pointer;color:var(--text-muted);font-family:Inter,sans-serif" onclick="toggleHabitToday(${h.id},'${today}')" id="hbtn-${h.id}">${done?'Feito ✓':'Marcar'}</button></div>`;
      }).join('')
    : '<div style="font-size:12px;color:var(--text-light);padding:8px 0">Sem hábitos definidos</div>';

  const objsHtml = objs.length
    ? objs.map(o => {
        const days = Math.ceil((new Date(o.deadline) - now) / 86400000);
        return `<div class="today-item"><div class="today-item-dot ${days<=2?'urgent':'gold'}"></div><div class="today-item-text">${o.title} <span style="font-size:11px;color:var(--text-muted)">(${o.progress||0}%)</span></div><span style="font-size:11px;color:${days<=2?'var(--red)':'var(--text-muted)'}">${days}d</span></div>`;
      }).join('')
    : '<div style="font-size:12px;color:var(--text-light);padding:8px 0">Sem objetivos urgentes</div>';

  document.getElementById('todayGrid').innerHTML = `
    <div class="today-card">
      <div class="today-card-title">Posts de Hoje</div>
      ${postsHtml}
      <a href="index.html" style="display:inline-block;margin-top:10px;font-size:11px;color:var(--gold);text-decoration:none">Ver calendário →</a>
    </div>
    <div class="today-card">
      <div class="today-card-title">Hábitos do Dia</div>
      ${habitsHtml}
      <a href="pessoal.html" style="display:inline-block;margin-top:10px;font-size:11px;color:var(--gold);text-decoration:none">Ver todos →</a>
    </div>
    <div class="today-card">
      <div class="today-card-title">Objetivos Urgentes</div>
      ${objsHtml}
      <a href="pessoal.html" style="display:inline-block;margin-top:10px;font-size:11px;color:var(--gold);text-decoration:none">Ver objetivos →</a>
    </div>`;
}

function toggleHabitToday(id, today) {
  const habits = PA.get('habits', []);
  const h = habits.find(x => x.id === id); if (!h) return;
  if (!h.completions) h.completions = [];
  if (h.completions.includes(today)) h.completions = h.completions.filter(d => d !== today);
  else h.completions.push(today);
  PA.set('habits', habits);
  renderToday();
}

function refreshToday() { renderToday(); toast('Atualizado'); }

async function getAIBriefing() {
  document.getElementById('aiBriefing').innerHTML = '<div class="loading-wrap" style="min-height:100px"><div class="spin"></div><div class="loading-txt">A preparar o briefing do dia</div></div>';
  const today = new Date().toISOString().split('T')[0];
  const cal = PA.get('cal',[]).filter(p=>p.date===today);
  const habits = PA.get('habits',[]);
  const objs = PA.get('objectives',[]).filter(o=>o.deadline&&Math.ceil((new Date(o.deadline)-new Date())/86400000)<=7);
  const arc = PA.get('archive',[]).slice(0,3);
  const prompt = `Dá-me um briefing estratégico para hoje:\n- Posts agendados: ${cal.map(p=>p.title).join(', ')||'nenhum'}\n- Hábitos: ${habits.map(h=>h.title).join(', ')||'nenhum'}\n- Objetivos urgentes: ${objs.map(o=>o.title).join(', ')||'nenhum'}\n- Últimos conteúdos gerados: ${arc.map(a=>a.topic||a.fmt).join(', ')||'nenhum'}\n\nSê direto e concreto. O que é mais importante fazer hoje? Máximo 150 palavras.`;
  try {
    const data = await callAPI(getSys(), [{role:'user',content:prompt}], 400);
    document.getElementById('aiBriefing').innerHTML = `<div class="card"><div class="card-label">Briefing IA</div><div class="card-body" style="font-size:13px;line-height:1.85">${renderMd(getReply(data))}</div></div>`;
  } catch(e) { document.getElementById('aiBriefing').innerHTML = ''; toast('Erro', 'error'); }
}

async function generateWeeklyReport() {
  const btn = document.getElementById('weeklyBtn'); btn.disabled = true;
  document.getElementById('weeklyOutput').innerHTML = '<div class="loading-wrap"><div class="spin"></div><div class="loading-txt">A analisar a tua semana</div></div>';
  const today = new Date();
  const weekAgo = new Date(today - 7*86400000).toISOString().split('T')[0];
  const arc = PA.get('archive',[]).filter(i=>i.date>=weekAgo);
  const cal = PA.get('cal',[]).filter(p=>p.date>=weekAgo);
  const habits = PA.get('habits',[]);
  const objs = PA.get('objectives',[]);
  const costs = PA.get('costs',{});
  const todayStr = today.toISOString().split('T')[0];
  const weekCost = Object.entries(costs.day||{}).filter(([d])=>d>=weekAgo&&d<=todayStr).reduce((s,[,v])=>s+v,0);
  const prompt = `Gera um relatório semanal completo para Patrício Ferreira:\n\nCONTEÚDO: ${arc.length} conteúdos gerados (${arc.map(i=>i.fmt).join(', ')||'nenhum'})\nCALENDÁRIO: ${cal.length} posts (${cal.filter(p=>p.status==='publicado').length} publicados)\nHÁBITOS: ${habits.map(h=>`${h.title}: ${(h.completions||[]).filter(d=>d>=weekAgo).length}/7 dias`).join('; ')||'nenhum'}\nOBJETIVOS: ${objs.map(o=>`${o.title} ${o.progress||0}%`).join('; ')||'nenhum'}\nCUSTO API: €${weekCost.toFixed(3)}\n\nAnalisa cada área, destaca o que correu bem, o que ficou por fazer, e dá 3 prioridades para a próxima semana. Sê direto e concreto.`;
  try {
    const data = await callAPI(getSys(), [{role:'user',content:prompt}], 1000);
    document.getElementById('weeklyOutput').innerHTML = `<div class="fade-in"><div class="card"><div class="card-label">Relatório — Semana de ${weekAgo} a ${todayStr}</div><div class="card-body" style="font-size:13px;line-height:1.85">${renderMd(getReply(data))}</div></div></div>`;
  } catch(e) { document.getElementById('weeklyOutput').innerHTML = '<div class="empty-wrap"><div class="empty-txt">Erro. Tenta novamente.</div></div>'; }
  btn.disabled = false;
}
</script>
</body>
</html>
